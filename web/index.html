<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>LingChat</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <header>
    <div class="brand">Ling<span>Chat</span></div>
    <div class="meta" id="meta">
      <span class="dot" id="status-dot" title="disconnected"></span>
      <span id="agent-info">connecting…</span>
    </div>
  </header>

  <main id="messages" aria-live="polite"></main>

  <!-- Inline shell-confirmation prompt, shown only when the agent asks. -->
  <div id="confirm" class="confirm hidden">
    <div class="confirm-body">
      <div class="confirm-label">Run shell command?</div>
      <code id="confirm-cmd"></code>
      <div class="confirm-actions">
        <button id="confirm-allow" class="btn allow">Allow once</button>
        <button id="confirm-deny" class="btn deny">Deny</button>
      </div>
    </div>
  </div>

  <form id="composer" autocomplete="off">
    <textarea id="input" rows="1" placeholder="Message the agent…  (Enter to send, Shift+Enter for newline)"></textarea>
    <button id="send" type="submit">Send</button>
  </form>

  <script src="/app.js"></script>
</body>
</html>
